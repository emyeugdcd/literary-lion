{{define "edit_profile.html"}}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile - Literary Lions</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Playwrite+RO:wght@100..400&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="/images/bookicon.png" />
  </head>
  <body>
    {{ template "elements/header.html" . }}
    <main>
      <div class="container">
        <div class="content">
          <h1>Edit Profile</h1>

          <form action="/profile/edit" method="POST">
            <div class="form-group">
              <label for="bio">Bio (Optional)</label>
              <textarea
                id="bio"
                name="bio"
                rows="4"
                maxlength="500"
                placeholder="Tell us about yourself..."
              >
{{.Bio}}</textarea
              >
              <small>Max 500 characters</small>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">
                Save Changes
              </button>
              <a href="/profile/{{.Username}}" class="btn btn-secondary"
                >Cancel</a
              >
            </div>
          </form>
        </div>
      </div>
    </main>
    {{ template "elements/footer.html" . }}
  </body>
</html>
{{end}}
